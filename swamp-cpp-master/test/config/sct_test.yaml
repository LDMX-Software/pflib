        bus: 0
    i2c_trg_e1:
      type: lpgbt_i2c
      carrier: lpgbt_trg_e
      cfg:
        bus: 1
    i2c_trg_e2:
      type: lpgbt_i2c
      carrier: lpgbt_trg_e
      cfg:
        bus: 2        
